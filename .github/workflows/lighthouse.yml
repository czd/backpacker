name: Lighthouse mobile

# AGENTS.md §6.7: every preview deployment runs Lighthouse (mobile) and
# must pass Performance >=0.90, PWA >=0.90, Accessibility >=0.95.
#
# Triggered by Vercel's GitHub integration — when a preview deployment
# succeeds, GitHub fires a `deployment_status` event with the live preview
# URL, and this workflow runs LHCI against it. That is more representative
# of production than `bun run start` on a runner: same CDN, same headers,
# same cold-start characteristics as users will hit.
#
# Production LHCI runs are a future concern; the `environment` filter
# below excludes them so M0 only gates on preview deploys.

on:
  deployment_status:

jobs:
  lighthouse:
    if: |
      github.event.deployment_status.state == 'success' &&
      contains(github.event.deployment_status.environment, 'Preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Lighthouse CI against Vercel preview
        env:
          # `environment_url` is the live preview URL (e.g.
          # https://backpacker-git-feat-m0-skeleton-<owner>.vercel.app).
          # `target_url` is sometimes Vercel's inspect URL — we want the
          # former. If a future Vercel update flips the field semantics,
          # this is the line to edit.
          PREVIEW_URL: ${{ github.event.deployment_status.environment_url }}
        run: |
          if [ -z "$PREVIEW_URL" ]; then
            echo "No environment_url on deployment_status — Vercel field semantics may have changed." >&2
            exit 1
          fi
          echo "Running LHCI against: $PREVIEW_URL"
          bunx --bun @lhci/cli@0.15.x autorun \
            --config=./lighthouserc.json \
            --collect.url="$PREVIEW_URL"
