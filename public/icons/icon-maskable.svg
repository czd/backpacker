<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Backpacker app icon — maskable variant.
       Per https://web.dev/maskable-icon/ the safe zone is the central
       circle of diameter 80% (i.e. radius 204.8 around 256,256). Android
       adaptive masks may crop everything outside that circle. We:
         - paint a fully opaque, full-bleed background (no transparency,
           halos kill the look on rounded/squircle masks)
         - keep the pictogram at ~70% scale so it sits comfortably inside
           the safe circle even on the most aggressive masks (e.g. teardrop) -->

  <rect width="512" height="512" fill="#f6f1e6"/>

  <!-- Pictogram, scaled to 0.7 of the any-purpose composition. -->
  <g transform="translate(256 256) scale(0.7)" fill="none" stroke="#385c87" stroke-linejoin="round" stroke-linecap="round">
    <path
      stroke-width="14"
      fill="#f6f1e6"
      d="
        M -170 -90
        L  -56 -110
        L   56  -90
        L  170 -110
        L  170  100
        L   56  120
        L  -56  100
        L -170  120
        Z" />

    <path stroke-width="10" d="M -56 -110 L -56 100" />
    <path stroke-width="10" d="M  56  -90 L  56 120" />

    <path
      stroke-width="9"
      stroke-dasharray="3 14"
      d="M -130 60 C -90 -20, -10 -30, 30 10 S 110 30, 140 -50" />

    <g transform="translate(140 -50)">
      <circle r="22" fill="#385c87" stroke="none" />
      <circle r="8" fill="#f6f1e6" stroke="none" />
    </g>
  </g>
</svg>
